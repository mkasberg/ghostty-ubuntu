name: Release Ghostty for PPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Ghostty version to build (default: 1.3.1)'
        required: false
        default: '1.3.1'
        type: string
      upload:
        description: 'Upload to PPA (default: false)'
        required: false
        default: false
        type: boolean

jobs:
  build-ghostty:
    name: Build Ghostty for PPA
    uses: ./.github/workflows/ppa-build-ghostty.yml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      upload: ${{ inputs.upload }}
      ppa: mkasberg/ghostty-ubuntu
      build_matrix: |
        {
          "builds": [
            {"codename": "noble", "container-image": "ubuntu:24.04"},
            {"codename": "questing", "container-image": "ubuntu:25.10"}
          ]
        }
